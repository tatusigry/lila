<style>
  :root{
    /* color */
    --bg: #FBFAFE;
    --violet-900: #241335;
    --violet-700: #4B2E83;
    --violet-600: #6E3AFF;
    --violet-500: #8B5FE8;
    --violet-400: #A97FF0;
    --violet-300: #D9C4FF;
    --violet-100: #F4EEFF;
    --white: #FFFFFF;
    --shadow-violet: rgba(110, 58, 255, 0.25);
    --text-muted: #6B5C87;   /* 5.99:1 on white — passes WCAG AA */
    --text-faint: #7A6B9C;   /* 4.76:1 on white — passes WCAG AA */

    /* type scale: 12 / 14 / 16 / 20 / display */
    --fs-caption: 12px;
    --fs-caption-sm: 10px;
    --fs-body: 14px;
    --fs-body-lg: 16px;
    --fs-title: 20px;
    --fs-number: clamp(32px, 8vw, 40px);
    --fs-display: clamp(28px, 5vw, 40px);

    /* spacing scale: 4 / 8 / 12 / 16 / 24 / 32 / 48 */
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-6: 24px;
    --sp-8: 32px;
    --sp-12: 48px;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html{ scroll-behavior: smooth; }

  body{
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-body);
    background: var(--bg);
    color: var(--violet-900);
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
  }

  .grain{
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.05;
    pointer-events: none;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  main{
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 var(--sp-6);
  }

  /* ---------- HERO ---------- */
  header.hero{
    position: relative;
    padding: var(--sp-8) 0 var(--sp-3);
    text-align: center;
  }
  header.hero::before{
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 130%;
    height: 260px;
    transform: translate(-50%, -55%);
    background: radial-gradient(ellipse at center, rgba(139,95,232,0.38) 0%, rgba(169,127,240,0.16) 45%, transparent 72%);
    filter: blur(28px);
    z-index: -1;
    pointer-events: none;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .eyebrow{
    font-size: var(--fs-caption);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--violet-500);
    font-weight: 600;
    margin-bottom: var(--sp-2);
    opacity: 0;
    animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .05s both;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: var(--fs-display);
    line-height: 1.15;
    color: var(--violet-700);
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeUp .8s cubic-bezier(.22,1,.36,1) .18s both;
  }

  section{ padding: var(--sp-4) 0; }
  .section-title{
    font-family: 'Fraunces', serif;
    font-size: var(--fs-title);
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: var(--sp-4);
  }

  .card{
    background: var(--white);
    border-radius: 24px;
    padding: var(--sp-6) var(--sp-4);
    box-shadow: 0 24px 60px -20px var(--shadow-violet), 0 2px 8px rgba(36,19,53,0.04);
    border: 1px solid rgba(139,95,232,0.08);
  }

  .reveal{
    opacity: 0;
    transform: translateY(28px);
    transition: opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1);
  }
  .reveal.is-visible{
    opacity: 1;
    transform: translateY(0);
  }

  /* ---------- DICE ---------- */
  #dice .card{
    padding-top: var(--sp-12);
  }
  .dice-stage{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--sp-4);
  }
  .dice-scene{
    width: 116px;
    height: 116px;
    perspective: 4200px;
    filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.28));
    cursor: pointer;
  }
  .cube{
    width: 100%;
    height: 100%;
    position: relative;
    background: #F6F1FF;
    border-radius: 14px;
    transform-style: preserve-3d;
    transform: rotateX(0deg) rotateY(0deg);
    transition: transform 1.3s cubic-bezier(0.65, 0, 0.35, 1);
    will-change: transform;
  }
  .face{
    position: absolute;
    top: -3px;
    left: -3px;
    width: 122px;
    height: 122px;
    background: linear-gradient(155deg, #ffffff 0%, #F6F1FF 55%, #EEE5FF 100%);
    border-radius: 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: var(--sp-4);
    backface-visibility: hidden;
  }
  .pip{
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--violet-600);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
    justify-self: center;
    align-self: center;
  }

  .p1  { grid-area: 2 / 2; }
  .p2a { grid-area: 1 / 1; } .p2b { grid-area: 3 / 3; }
  .p3a { grid-area: 1 / 1; } .p3b { grid-area: 2 / 2; } .p3c { grid-area: 3 / 3; }
  .p4a { grid-area: 1 / 1; } .p4b { grid-area: 1 / 3; } .p4c { grid-area: 3 / 1; } .p4d { grid-area: 3 / 3; }
  .p5a { grid-area: 1 / 1; } .p5b { grid-area: 1 / 3; } .p5c { grid-area: 2 / 2; } .p5d { grid-area: 3 / 1; } .p5e { grid-area: 3 / 3; }
  .p6a { grid-area: 1 / 1; } .p6b { grid-area: 1 / 3; } .p6c { grid-area: 2 / 1; } .p6d { grid-area: 2 / 3; } .p6e { grid-area: 3 / 1; } .p6f { grid-area: 3 / 3; }

  .face-front  { transform: rotateY(0deg)   translateZ(58px); }
  .face-back   { transform: rotateY(180deg) translateZ(58px); }
  .face-right  { transform: rotateY(90deg)  translateZ(58px); }
  .face-left   { transform: rotateY(-90deg) translateZ(58px); }
  .face-top    { transform: rotateX(90deg)  translateZ(58px); }
  .face-bottom { transform: rotateX(-90deg) translateZ(58px); }

  .btn{
    appearance: none;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--fs-body);
    color: var(--white);
    background: linear-gradient(135deg, var(--violet-600), var(--violet-500));
    padding: var(--sp-3) var(--sp-8);
    border-radius: 999px;
    box-shadow: 0 10px 28px -8px var(--shadow-violet);
    transition: transform .25s ease, box-shadow .25s ease;
    letter-spacing: 0.01em;
  }
  .btn:hover{ transform: translateY(-2px); box-shadow: 0 16px 34px -8px var(--shadow-violet); }
  .btn:active{ transform: translateY(0px) scale(0.98); }
  .btn:disabled{ opacity: 0.6; cursor: default; transform:none; }

  .result-badge{
    font-size: var(--fs-caption);
    color: var(--violet-500);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    min-height: 18px;
  }

  .history-block{
    width: 100%;
    max-width: 460px;
  }
  .history-label{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--sp-2);
    font-size: var(--fs-caption-sm);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: var(--sp-3);
  }
  .history-label-text{
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    font-size: var(--fs-caption-sm);
  }
  .history-label .arrow{ color: var(--violet-500); }
  .clear-btn{
    appearance: none;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: var(--fs-caption-sm);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--violet-500);
    padding: var(--sp-1) var(--sp-2);
    border-radius: 999px;
    transition: background .2s ease, color .2s ease;
  }
  .clear-btn:hover{
    background: var(--violet-100);
    color: var(--violet-700);
  }
  .history{
    display: flex;
    flex-wrap: wrap;
    gap: var(--sp-1);
  }
  .chip{
    width: 20px; height: 20px;
    border-radius: 6px;
    background: var(--violet-100);
    color: var(--violet-700);
    font-weight: 600;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: chipIn .35s ease both;
  }
  .chip.latest{
    background: linear-gradient(135deg, var(--violet-600), var(--violet-500));
    color: var(--white);
    box-shadow: 0 6px 16px -4px var(--shadow-violet);
  }
  @keyframes chipIn{
    from{ opacity:0; transform: scale(0.5); }
    to{ opacity:1; transform: scale(1); }
  }
  .history-empty{
    font-size: var(--fs-caption);
    color: var(--text-faint);
  }

  /* ---------- NUMBER GENERATOR ---------- */
  .gen-stage{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--sp-4);
  }
  .result-field{
    width: 100%;
    max-width: 440px;
    min-height: 132px;
    border-radius: 20px;
    background: var(--violet-100);
    border: 1px solid rgba(139,95,232,0.14);
    color: var(--violet-900);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--sp-1);
    padding: var(--sp-6);
  }
  .result-number{
    font-family: 'Fraunces', serif;
    font-size: var(--fs-number);
    font-weight: 500;
    line-height: 1;
    color: var(--violet-700);
  }
  .result-name{
    font-size: var(--fs-body-lg);
    font-weight: 500;
    text-align: center;
    line-height: 1.5;
    color: var(--violet-700);
    max-width: 360px;
  }
  .result-empty{
    color: var(--text-muted);
    font-size: var(--fs-body-lg);
  }
  .fade-in-result{
    animation: resultReveal .5s cubic-bezier(.22,1,.28,1) both;
  }
  @keyframes resultReveal{
    from{ opacity:0; transform: translateY(10px) scale(0.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  /* ---------- FOOTER ---------- */
  footer{
    padding: var(--sp-6) 0 var(--sp-8);
    text-align: center;
  }
  .ig-link{
    display: inline-flex;
    align-items: center;
    gap: var(--sp-2);
    color: var(--violet-700);
    text-decoration: none;
    font-weight: 600;
    font-size: var(--fs-body);
    padding: var(--sp-3) var(--sp-6);
    border-radius: 999px;
    border: 1px solid var(--violet-300);
    transition: background .25s ease, color .25s ease, transform .25s ease;
  }
  .ig-link:hover{
    background: var(--violet-100);
    transform: translateY(-2px);
  }
  .ig-link svg{ width: 18px; height: 18px; }
  .footer-note{
    margin-top: var(--sp-4);
    font-size: var(--fs-caption);
    color: var(--text-faint);
  }

  @media (max-width: 600px){
    header.hero{ padding: var(--sp-6) 0 var(--sp-2); }
    .card{ padding: var(--sp-4); border-radius: 20px; }
    #dice .card{ padding-top: var(--sp-8); }
    .dice-scene{ width: 100px; height: 100px; }
    .face{ width: 106px; height: 106px; top: -3px; left: -3px; padding: var(--sp-3); border-radius: 12px; }
    .face-front  { transform: rotateY(0deg)   translateZ(50px); }
    .face-back   { transform: rotateY(180deg) translateZ(50px); }
    .face-right  { transform: rotateY(90deg)  translateZ(50px); }
    .face-left   { transform: rotateY(-90deg) translateZ(50px); }
    .face-top    { transform: rotateX(90deg)  translateZ(50px); }
    .face-bottom { transform: rotateX(-90deg) translateZ(50px); }
    .pip{ width: 13px; height: 13px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<div class="grain"></div>

<main>
  <header class="hero">
    <div class="eyebrow">Аля Голоуніна</div>
    <h1>Трансформаційна<br>гра ЛІЛА</h1>
  </header>

  <section id="dice">
    <h2 class="section-title">Кубик</h2>
    <div class="card reveal">
      <div class="dice-stage">
        <div class="dice-scene" id="diceScene" role="button" tabindex="0" aria-label="Кинути кубик">
          <div class="cube" id="cube">
            <div class="face face-front"><span class="pip p1"></span></div>
            <div class="face face-back"><span class="pip p6a"></span><span class="pip p6b"></span><span class="pip p6c"></span><span class="pip p6d"></span><span class="pip p6e"></span><span class="pip p6f"></span></div>
            <div class="face face-right"><span class="pip p2a"></span><span class="pip p2b"></span></div>
            <div class="face face-left"><span class="pip p5a"></span><span class="pip p5b"></span><span class="pip p5c"></span><span class="pip p5d"></span><span class="pip p5e"></span></div>
            <div class="face face-top"><span class="pip p3a"></span><span class="pip p3b"></span><span class="pip p3c"></span></div>
            <div class="face face-bottom"><span class="pip p4a"></span><span class="pip p4b"></span><span class="pip p4c"></span><span class="pip p4d"></span></div>
          </div>
        </div>
        <div class="result-badge" id="diceBadge" aria-live="polite">&nbsp;</div>
        <button class="btn" id="rollBtn">Кинути кубик</button>
        <div class="history-block">
          <div class="history-label">
            <span class="history-label-text"><span class="arrow">←</span> Історія кидків, найновіший зліва</span>
            <button class="clear-btn" id="clearDiceBtn" type="button">Очистити</button>
          </div>
          <div class="history" id="diceHistory"><span class="history-empty">Кидків ще не було</span></div>
        </div>
      </div>
    </div>
  </section>

  <section id="numbers">
    <h2 class="section-title">Генератор числа</h2>
    <div class="card reveal">
      <div class="gen-stage">
        <div class="result-badge" id="numberBadge" aria-live="polite">&nbsp;</div>
        <button class="btn" id="genBtn">Згенерувати число</button>
        <div class="result-field" id="resultField" aria-live="polite">
          <span class="result-empty">Натисніть кнопку, щоб отримати число</span>
        </div>
        <div class="history-block">
          <div class="history-label">
            <span class="history-label-text"><span class="arrow">←</span> Історія чисел, найновіше зліва</span>
            <button class="clear-btn" id="clearNumberBtn" type="button">Очистити</button>
          </div>
          <div class="history" id="numberHistory"><span class="history-empty">Ще не було жодного числа</span></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="reveal">
    <a class="ig-link" href="https://www.instagram.com/golounina.alya/" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor"/>
      </svg>
      <span class="ig-link-text">@golounina.alya</span>
    </a>
    <p class="footer-note">Провідниця гри Ліла — Аля Голоуніна</p>
  </footer>
</main>

<script>
  // ---- Scroll-in reveal animation ----
  const revealEls = document.querySelectorAll('.reveal');
  revealEls.forEach((el, i) => { el.style.transitionDelay = (i * 0.06) + 's'; });
  if ('IntersectionObserver' in window){
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting){
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    revealEls.forEach((el) => io.observe(el));
  } else {
    revealEls.forEach((el) => el.classList.add('is-visible'));
  }

  // ---- Cryptographically secure uniform random integer in [0, max) ----
  function secureRandomInt(max){
    const maxUint32 = 0xFFFFFFFF;
    const limit = maxUint32 - (maxUint32 % max);
    let x;
    const arr = new Uint32Array(1);
    do{
      crypto.getRandomValues(arr);
      x = arr[0];
    } while (x > limit);
    return x % max;
  }

  // ---- Field names 1-72 ----
  const LILA_NAMES = {
    1:"народження", 2:"ілюзія", 3:"гнів", 4:"істинні бажання", 5:"рід / муладхара",
    6:"омана", 7:"марнославство", 8:"незадоволеність", 9:"чуттєвий досвід", 10:"очищення (стріла)",
    11:"розвага", 12:"заздрість (змія «відкладеного щастя»)", 13:"нікчемність", 14:"звʼязок / свадхістана", 15:"фантазії, мрії",
    16:"ревнощі (змія)", 17:"співчуття (стріла)", 18:"радість", 19:"карма", 20:"благодійність (стріла)",
    21:"виправлення", 22:"закони світобудови (стріла)", 23:"впевненість / маніпура", 24:"погана компанія (змія)", 25:"хороша компанія",
    26:"печаль", 27:"вища ціль (стріла)", 28:"прийняття власної природи (стріла)", 29:"неприйняття власної природи (змія)", 30:"хороші тенденції",
    31:"зустріч з вчителем", 32:"рівновага / анахата", 33:"аромати", 34:"смаки", 35:"чистилище",
    36:"ясність свідомості", 37:"мудрість (стріла)", 38:"енергія", 39:"відпускання", 40:"енергетична цілісність",
    41:"свобода реалізації / вішудха", 42:"вогонь", 43:"народження людини", 44:"незнання (змія)", 45:"правильне знання (стріла)",
    46:"інтуіція (стріла)", 47:"нейтральність", 48:"сонце", 49:"місяць", 50:"аскеза / аджна",
    51:"земля", 52:"насилля", 53:"вода", 54:"духовна відданість (стріла)", 55:"егоїзм",
    56:"звук", 57:"повітря, легкість", 58:"розширення", 59:"реальність / сахасрара", 60:"вірно направлена свідомість",
    61:"невірно направлена свідомість (змія)", 62:"щастя", 63:"інерція (змія)", 64:"феноменальний план", 65:"внутрішній простір",
    66:"блаженство", 67:"космічне благо", 68:"космічна свідомість", 69:"енергія творення", 70:"енергія благості",
    71:"енергія руху", 72:"енергія інерції (змія)"
  };

  // ---- Persistent storage (survives closing the page / re-opening from home screen) ----
  const STORAGE_DICE = 'lila_dice_history';
  const STORAGE_NUMBERS = 'lila_number_history';

  function loadHistory(key){
    try{
      const raw = localStorage.getItem(key);
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch(e){
      return [];
    }
  }

  function saveHistory(key, arr){
    try{
      localStorage.setItem(key, JSON.stringify(arr));
    } catch(e){
      // storage unavailable (private mode / blocked) — history still works for this session
    }
  }

  // ---- Dice logic ----
  const cube = document.getElementById('cube');
  const rollBtn = document.getElementById('rollBtn');
  const diceBadge = document.getElementById('diceBadge');
  const diceHistoryEl = document.getElementById('diceHistory');
  const clearDiceBtn = document.getElementById('clearDiceBtn');
  let diceHistory = loadHistory(STORAGE_DICE);
  let spinX = -1, spinY = -1; // running rotation accumulators for continuous smooth spinning

  // face -> rotation needed to bring that face to front (verified against
  // the face transforms above; opposite faces sum to 7)
  const faceRotation = {
    1: {x: 0,   y: 0},
    6: {x: 0,   y: 180},
    2: {x: 0,   y: -90},
    5: {x: 0,   y: 90},
    3: {x: -90, y: 0},
    4: {x: 90,  y: 0}
  };

  function setCubeInstant(value){
    const target = faceRotation[value];
    cube.style.transition = 'none';
    spinX = 0; spinY = 0;
    cube.style.transform = `rotateX(${target.x}deg) rotateY(${target.y}deg)`;
    void cube.offsetHeight; // force reflow before re-enabling transition
    cube.style.transition = '';
  }

  function rollDice(){
    rollBtn.disabled = true;
    const value = secureRandomInt(6) + 1;
    const target = faceRotation[value];

    spinX -= (2 + Math.floor(Math.random()*2));
    spinY -= (3 + Math.floor(Math.random()*2));

    const finalX = spinX * 360 + target.x;
    const finalY = spinY * 360 + target.y;

    cube.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg)`;
    diceBadge.textContent = 'Кидаємо…';

    setTimeout(() => {
      diceHistory.unshift(value);
      saveHistory(STORAGE_DICE, diceHistory);
      diceBadge.textContent = `Кидок №${diceHistory.length} · Випало: ${value}`;
      renderDiceHistory();
      rollBtn.disabled = false;
    }, 1300);
  }

  function renderDiceHistory(){
    diceHistoryEl.innerHTML = '';
    diceHistory.forEach((v, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (i === 0 ? ' latest' : '');
      chip.textContent = v;
      diceHistoryEl.appendChild(chip);
    });
  }

  rollBtn.addEventListener('click', rollDice);

  const diceScene = document.getElementById('diceScene');
  diceScene.addEventListener('click', () => {
    if (!rollBtn.disabled) rollDice();
  });
  diceScene.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && !rollBtn.disabled){
      e.preventDefault();
      rollDice();
    }
  });

  clearDiceBtn.addEventListener('click', () => {
    diceHistory = [];
    saveHistory(STORAGE_DICE, diceHistory);
    renderDiceHistory();
    diceBadge.textContent = '\u00A0';
    spinX = -1; spinY = -1;
    cube.style.transform = ''; // revert to the default resting pose
  });

  // ---- Number generator logic ----
  const genBtn = document.getElementById('genBtn');
  const numberBadge = document.getElementById('numberBadge');
  const resultField = document.getElementById('resultField');
  const numberHistoryEl = document.getElementById('numberHistory');
  const clearNumberBtn = document.getElementById('clearNumberBtn');
  let numberHistory = loadHistory(STORAGE_NUMBERS);

  function showResult(n){
    const name = LILA_NAMES[n];
    resultField.innerHTML = `
      <div class="result-number fade-in-result">${n}</div>
      <div class="result-name fade-in-result">${name}</div>
    `;
  }

  function generateNumber(){
    const n = secureRandomInt(72) + 1;
    showResult(n);
    numberHistory.unshift(n);
    saveHistory(STORAGE_NUMBERS, numberHistory);
    numberBadge.textContent = `Спроба №${numberHistory.length}`;
    renderNumberHistory();
  }

  function renderNumberHistory(){
    numberHistoryEl.innerHTML = '';
    numberHistory.forEach((v, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (i === 0 ? ' latest' : '');
      chip.textContent = v;
      numberHistoryEl.appendChild(chip);
    });
  }

  genBtn.addEventListener('click', generateNumber);

  clearNumberBtn.addEventListener('click', () => {
    numberHistory = [];
    saveHistory(STORAGE_NUMBERS, numberHistory);
    renderNumberHistory();
    resultField.innerHTML = '<span class="result-empty">Натисніть кнопку, щоб отримати число</span>';
    numberBadge.textContent = '\u00A0';
  });

  // ---- Restore state on load ----
  renderDiceHistory();
  renderNumberHistory();
  if (diceHistory.length > 0){
    setCubeInstant(diceHistory[0]);
    diceBadge.textContent = `Кидок №${diceHistory.length} · Випало: ${diceHistory[0]}`;
  }
  if (numberHistory.length > 0){
    showResult(numberHistory[0]);
    numberBadge.textContent = `Спроба №${numberHistory.length}`;
  }
</script>

</body>
</html>
